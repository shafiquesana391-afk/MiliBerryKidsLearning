<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learn ABC</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="home">

<h1>🔤 Learn ABC</h1>

<h3>⭐ Stars: <span id="stars">0</span></h3>

<h3>Progress</h3>

<progress id="progressBar" value="0" max="26"></progress>

<p><span id="progressText">0</span>/26 Letters</p>

<h2 id="letter">A</h2>

<div id="emoji" class="emoji">🍎</div>

<div id="reward" style="display:none;">
<h2>🎉 Excellent! 🎉</h2>
</div>

<h2 id="word">Apple</h2>

<button onclick="speak()">🔊 Listen</button>

<br><br>

<button onclick="previous()">⬅ Previous</button>

<button onclick="next()">Next ➡</button>

<br><br>

<button onclick="testVoice()">Test Voice</button>

<button onclick="window.location.href='home.html'">🏠 Home</button>

</div>

<script src="script.js"></script>

</body>
</html>
