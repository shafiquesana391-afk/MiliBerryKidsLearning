<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Numbers Memory Game</title>

<link rel="stylesheet" href="style.css">

<style>

.grid{
display:grid;
grid-template-columns:repeat(2,120px);
gap:20px;
justify-content:center;
margin-top:30px;
}

.card{
background:white;
border-radius:20px;
font-size:70px;
padding:20px;
cursor:pointer;
box-shadow:0 0 15px gray;
transition:.3s;
text-align:center;
}

.card:hover{
transform:scale(1.1);
background:#FFF3E0;
}

</style>

</head>

<body>

<div class="home">

<h1>🔢 Numbers Memory Game</h1>

<h2>Find Number 5️⃣</h2>

<div class="grid">

<div class="card" onclick="numberGame(3)">3️⃣</div>

<div class="card" onclick="numberGame(5)">5️⃣</div>

<div class="card" onclick="numberGame(7)">7️⃣</div>

<div class="card" onclick="numberGame(9)">9️⃣</div>

</div>

<h2 id="numberResult"></h2>

<br>

<button onclick="window.location.href='memory.html'">
⬅ Back
</button>

</div>

<script src="script.js"></script>

</body>
</html>
